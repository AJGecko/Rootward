// file: enemy.ms
function()
// Enemy-Initialisierung
initenemy = function()
  enemys = []
  global.kills = 0
  schwung_enemys = []
  
  
  // Lädt die Hitboxen für die Angriffe
  for i = 0 to 70
    eschwunghtb[i] = new hb.obj("schwunghtb", hb.asset("player/schwung_hitbox", "ani", 0, 1))
  end
  
  // Lädt die Angriffe (Objekte)
  for i = 0 to 70
    schwung_enemys[i] = new hb.obj("schwung", hb.asset("player/schwung", "ani", 0, 1))
    schwung_enemys[i].hitbox.set(eschwunghtb[i].body)
    schwung_enemys[i].tags = ["schwung_enemy"]
  end
  // Animationen laden
  enemytex = object
    idle = object
      front = hb.asset("enemy/gnome/idle/front", "ani", 0, 1)
      back  = hb.asset("enemy/gnome/idle/back", "ani", 0, 1)
      right = hb.asset("enemy/gnome/idle/right", "ani", 0, 1)
      left  = hb.asset("enemy/gnome/idle/left", "ani", 0, 1)
    end
    walking = object
      front = hb.asset("enemy/gnome/walking/front", "ani", 0, 1)
      back  = hb.asset("enemy/gnome/walking/back", "ani", 0, 1)
      right = hb.asset("enemy/gnome/walking/right", "ani", 0, 1)
      left  = hb.asset("enemy/gnome/walking/left", "ani", 0, 1)
    end
  end
end

// Funktion zum Spawnen von Gegnern
enemyspawn = function(x, y)
  // Erstellt ein Gegner Objekt, konfiguriert es und platziert es in der Welt
  local enemy = new hb.obj("enemy", enemytex.idle.front, ["enemy"], x, y, enemyaction)
  enemy.scale(1.75)
  enemy.lp = 50
  enemy.prio = 28
  enemy.di = "front"
  
  // Despawn-Timer für jeden Gegner einzeln initialisieren
  enemy.despawnTimer = 0

  enemys.push(enemy.id)

  // NoClip: Gegner kollidiert nicht mit Player / anderen Gegnern
  enemy.body.collisionFilter.group = -1
  for p in enemy.body.parts
    p.collisionFilter.group = -1
  end

  world.add(enemy)
  return enemy
end

// Gegner Code
enemyaction = function(self)
  local origin = bridgejs("origin")
  
  // Angriff Cooldown
  self.attackcooldown -= 1
  if self.attackcooldown < 0 then
    self.attack = 0
    self.attackcooldown = 50
  end
  
  // Überprüfung auf Schaden
  self.lplock -= 1
  if self.lplock < 1 then
    for things in self.collisions()
      if things.tags.contains("schwung_player") then
        self.lp -= 10
        self.sprite.tint = 0xFF0000
        after 40 do
          self.sprite.tint = 0xFFFFFF
        end
        self.lplock = 30
      end
    end
  end
  
  // Gegner Tod
  if self.lp < 0 then
    self.sprite.tint = 0
    after 250 do
      if not self.isdead then
        self.isdead = true
        // Kills plus eins
        global.kills = kills + 1
        
        // Entfernt sich selber
        world.remove(self)
        world.remove(schwung_enemys[enemys.indexOf(self.id)])
        enemys.removeElement(self.id)
      end
    end
    origin.Matter.Body.setVelocity(self.body, object x = 0 y = 0 end)
    return
  end
  
  // Setzt Dreh-Geschwindigkeit auf 0 indem Dreh-Widerstand auf Unendlich gesetzt wird
  origin.Matter.Body.setInertia(self.body, 1e308)
  
  // Gültigkeits-Checks
  if enemyInvalid(self, origin) then return end
  
  // Positionen & Distanz berechnen
  local enemyPos = self.position.get()
  local playerPos = player.position.get()
  local distToPlayer = sqrt((playerPos.x - enemyPos.x)^2 + (playerPos.y - enemyPos.y)^2)
  
  // Angriff ausführen
  angriff(self.attack, self, schwung_enemys[enemys.indexOf(self.id)],0)
  
  // Wenn nah am Spieler, dann stehenbleiben und angreifen
  if enemyHandleNah(self, origin, distToPlayer) then return end
  
  // Wenn zu weit weg vom Spieler, dann einfrieren (und nach 10 Sek despawnen)
  if enemyHandleFern(self, origin, distToPlayer) then return end
  
  // Sensoren auswerten
  local frei = enemyCheckSensors(self, origin, enemyPos)
  
  // Bewegung berechnen
  local moveVelocity = enemyComputeMovement(self, enemyPos, playerPos, frei)
  
  // Diagonal-Ausgleich für gleichmäßige Geschwindigkeit
  if moveVelocity.x != 0 and moveVelocity.y != 0 then
    moveVelocity.x = moveVelocity.x * 0.7071
    moveVelocity.y = moveVelocity.y * 0.7071
  end
  
  // Animation & Geschwindigkeit setzen
  setEnemyAnimation(self, moveVelocity.x, moveVelocity.y)
  origin.Matter.Body.setVelocity(self.body, moveVelocity)
end

// Prüft ob der Gegner-Status ungültig ist
enemyInvalid = function(self, origin)
  if not origin then return true end
  if not player or not player.body then return true end
  if not self.currentWorld or not self.currentWorld.physicsEngine then return true end
  return false
end

// Handhabt den Zustand wenn der Gegner nah am Spieler ist
enemyHandleNah = function(self, origin, distToPlayer)
  // Stop-Distanz mit Hysterese gegen Flackern an der Grenze
  local stopDist = 25
  if self.istNah then stopDist = 35 end

  if distToPlayer >= stopDist then
    self.istNah = false
    return false
  end

  // Spieler ist in Reichweite
  self.istNah = true

  // Stehen bleiben
  local stopVel = object end
  stopVel.x = 0
  stopVel.y = 0
  origin.Matter.Body.setVelocity(self.body, stopVel)

  // Ausweich-Status zurücksetzen
  self.aktuelleAusweichRichtung = ""
  self.ausweichTimer = 0

  // Idle-Animation abspielen
  setEnemyAnimation(self, 0, 0)

  // Angriff aktivieren
  self.attack = 1
  
  return true
end

// Handhabt den Zustand wenn der Spieler zu weit weg ist
enemyHandleFern = function(self, origin, distToPlayer)
  // Maximale Reichweite mit Hysterese festlegen
  local fernDist = 400
  if self.istFern then fernDist = 380 end

  if distToPlayer <= fernDist then
    self.istFern = false
    self.despawnTimer = 0 // Timer zurücksetzen, wenn der Spieler wieder nah genug ist
    return false
  end

  // Spieler ist zu weit weg
  self.istFern = true

  // Despawn-Timer hochzählen
  if not self.despawnTimer then self.despawnTimer = 0 end
  self.despawnTimer = self.despawnTimer + 1

  // Wenn 10 Sekunden erreicht sind, Gegner despawnen lassen
  if self.despawnTimer >= 600 then
    if not self.isdead then
      self.isdead = true
      
      // Entfernt sich selbst und Angriffs-Objekte aus der Welt
      world.remove(self)
      world.remove(schwung_enemys[enemys.indexOf(self.id)])
      enemys.removeElement(self.id)
      numberofenemy -= 1
    end
    return true
  end

  // Stehen bleiben
  local stopVel = object end
  stopVel.x = 0
  stopVel.y = 0
  origin.Matter.Body.setVelocity(self.body, stopVel)

  // Ausweich-Status zurücksetzen
  self.aktuelleAusweichRichtung = ""
  self.ausweichTimer = 0

  // Idle-Animation abspielen ohne Angriff
  setEnemyAnimation(self, 0, 0)

  return true
end

// Prüft die 8 Fühler-Punkte um Hindernisse zu erkennen
enemyCheckSensors = function(self, origin, enemyPos)
  local matterWorld = self.currentWorld.physicsEngine.world
  local allBodies = origin.Matter.Composite.allBodies(matterWorld)

  local pDist = 40
  local dDist = 40

  // Definiert die sensorischen Zielpunkte
  points = object
    rechts        = object x = enemyPos.x + pDist  y = enemyPos.y        end
    links         = object x = enemyPos.x - pDist  y = enemyPos.y        end
    oben          = object x = enemyPos.x        y = enemyPos.y + pDist  end
    unten         = object x = enemyPos.x        y = enemyPos.y - pDist  end
    oben_rechts   = object x = enemyPos.x + dDist  y = enemyPos.y + dDist  end
    oben_links    = object x = enemyPos.x - dDist  y = enemyPos.y + dDist  end
    unten_rechts = object x = enemyPos.x + dDist  y = enemyPos.y - dDist  end
    unten_links   = object x = enemyPos.x - dDist  y = enemyPos.y - dDist  end
  end

  // Einzelnen Sensorpunkt per Strahl (Ray) prüfen
  local checkPoint = function(pt)
    local hits = origin.Matter.Query.ray(allBodies, enemyPos, pt)
    for h in hits
      local b = h.body
      if b and b != self.body and b != player.body then
        local mainBody = b
        if b.parent then mainBody = b.parent end
        if mainBody.gameObject and mainBody.gameObject.tags and mainBody.gameObject.tags.includes("hitbox") then
          return false
        end
      end
    end
    return true
  end

  // Ergebnisse für alle Richtungen sammeln
  local frei = object
    rechts        = checkPoint(points.rechts)
    links         = checkPoint(points.links)
    oben          = checkPoint(points.oben)
    unten         = checkPoint(points.unten)
    oben_rechts   = checkPoint(points.oben_rechts)
    oben_links    = checkPoint(points.oben_links)
    unten_rechts = checkPoint(points.unten_rechts)
    unten_links   = checkPoint(points.unten_links)
  end

  // Sensorpunkte für spätere Berechnungen mitsenden
  frei.points = points
  return frei
end

// Berechnet die Geschwindigkeit inklusive Ausweichen und Separation
enemyComputeMovement = function(self, enemyPos, playerPos, frei)
  local espeed = 1.4
  local points = frei.points

  local moveVelocity = object end
  moveVelocity.x = 0
  moveVelocity.y = 0

  // Zustandswerte initialisieren falls leer
  if not self.ausweichTimer then self.ausweichTimer = 0 end
  if not self.aktuelleAusweichRichtung then self.aktuelleAusweichRichtung = "" end

  // Zielrichtung zum Spieler bestimmen
  local wollenX = 0
  local wollenY = 0
  if playerPos.x > enemyPos.x + 5 then wollenX = 1
  elsif playerPos.x < enemyPos.x - 5 then wollenX = -1
  end
  if playerPos.y > enemyPos.y + 5 then wollenY = 1
  elsif playerPos.y < enemyPos.y - 5 then wollenY = -1
  end

  // Prüfen ob die Wunschrichtung blockiert ist
  local wegBlockiert = false
  if wollenX > 0 and not frei.rechts then wegBlockiert = true end
  if wollenX < 0 and not frei.links  then wegBlockiert = true end
  if wollenY > 0 and not frei.oben   then wegBlockiert = true end
  if wollenY < 0 and not frei.unten  then wegBlockiert = true end
  if wollenX > 0 and wollenY > 0 and not frei.oben_rechts  then wegBlockiert = true end
  if wollenX < 0 and wollenY > 0 and not frei.oben_links   then wegBlockiert = true end
  if wollenX > 0 and wollenY < 0 and not frei.unten_rechts then wegBlockiert = true end
  if wollenX < 0 and wollenY < 0 and not frei.unten_links  then wegBlockiert = true end

  // Ausweich-Timer herunterzählen und Weg blockiert halten
  if self.ausweichTimer > 0 then
    cleaner = true
    wegBlockiert = true
    self.ausweichTimer = self.ausweichTimer - 1
  end

  // Direkt zum Spieler bewegen falls der Weg frei ist
  if not wegBlockiert then
    self.aktuelleAusweichRichtung = ""
    self.ausweichTimer = 0
    moveVelocity.x = wollenX * espeed
    moveVelocity.y = wollenY * espeed
  else
    // Ausweich-Modus aktivieren
    local besteRichtung = enemyChooseEvade(self, playerPos, frei, points)

    // Richtungswerte in Geschwindigkeit übersetzen
    if besteRichtung == "rechts" then moveVelocity.x = espeed
    elsif besteRichtung == "links" then moveVelocity.x = -espeed
    elsif besteRichtung == "oben" then moveVelocity.y = espeed
    elsif besteRichtung == "unten" then moveVelocity.y = -espeed
    elsif besteRichtung == "oben_rechts" then moveVelocity.x = espeed moveVelocity.y = espeed
    elsif besteRichtung == "oben_links" then moveVelocity.x = -espeed moveVelocity.y = espeed
    elsif besteRichtung == "unten_rechts" then moveVelocity.x = espeed moveVelocity.y = -espeed
    elsif besteRichtung == "unten_links" then moveVelocity.x = -espeed moveVelocity.y = -espeed
    end
  end

  // Separation: Abstand zu anderen Gegnern halten
  local origin = bridgejs("origin")
  local matterWorld = self.currentWorld.physicsEngine.world
  local allBodies = origin.Matter.Composite.allBodies(matterWorld)
  
  // Radius für den Mindestabstand festlegen
  local minDistance = 10 
  
  for b in allBodies
    // Prüfen ob das gefundene Objekt ein anderer Gegner ist
    if b and b != self.body and b.gameObject and b.gameObject.tags and b.gameObject.tags.includes("enemy") then
      local otherPos = b.position
      local dx = enemyPos.x - otherPos.x
      local dy = enemyPos.y - otherPos.y
      local dist = sqrt(dx^2 + dy^2)
      
      // Bei Unterschreitung des Abstands eine Gegenkraft erzeugen
      if dist < minDistance and dist > -1 then
        local pushStrength = 6
        moveVelocity.x = moveVelocity.x + (dx / dist) * pushStrength + 0.1
        moveVelocity.y = moveVelocity.y + (dy / dist) * pushStrength + 0.1
      end
    end
  end

  return moveVelocity
end

// Wählt die beste freie Richtung zum Ausweichen aus
enemyChooseEvade = function(self, playerPos, frei, points)
  local besteRichtung = ""

  // Aktuelle Richtung beibehalten falls sie noch frei ist (verhindert Zittern)
  if self.aktuelleAusweichRichtung == "rechts" and frei.rechts then besteRichtung = "rechts"
  elsif self.aktuelleAusweichRichtung == "links"  and frei.links  then besteRichtung = "links"
  elsif self.aktuelleAusweichRichtung == "oben"   and frei.oben   then besteRichtung = "oben"
  elsif self.aktuelleAusweichRichtung == "unten"  and frei.unten  then besteRichtung = "unten"
  elsif self.aktuelleAusweichRichtung == "oben_rechts"  and frei.oben_rechts  and frei.oben  and frei.rechts then besteRichtung = "oben_rechts"
  elsif self.aktuelleAusweichRichtung == "oben_links"   and frei.oben_links   and frei.oben  and frei.links  then besteRichtung = "oben_links"
  elsif self.aktuelleAusweichRichtung == "unten_rechts" and frei.unten_rechts and frei.unten and frei.rechts then besteRichtung = "unten_rechts"
  elsif self.aktuelleAusweichRichtung == "unten_links"  and frei.unten_links  and frei.unten and frei.links  then besteRichtung = "unten_links"
  end

  if besteRichtung != "" then return besteRichtung end

  // Neue optimale Richtung ermitteln
  local besteDist = 999999

  // Kehrtwende-Sperre einrichten
  local gegenRichtung = ""
  if self.aktuelleAusweichRichtung == "rechts" then gegenRichtung = "links"
  elsif self.aktuelleAusweichRichtung == "links" then gegenRichtung = "rechts"
  elsif self.aktuelleAusweichRichtung == "oben" then gegenRichtung = "unten"
  elsif self.aktuelleAusweichRichtung == "unten" then gegenRichtung = "oben"
  elsif self.aktuelleAusweichRichtung == "oben_rechts" then gegenRichtung = "unten_links"
  elsif self.aktuelleAusweichRichtung == "oben_links" then gegenRichtung = "unten_rechts"
  elsif self.aktuelleAusweichRichtung == "unten_rechts" then gegenRichtung = "oben_links"
  elsif self.aktuelleAusweichRichtung == "unten_links" then gegenRichtung = "oben_rechts"
  end

  // Kleines Rauschen einbauen um identische Werte aufzubrechen
  local rnd = (random.next() - 0.5) * 6

  // Distanzwerte für Richtung Rechts auswerten
  if frei.rechts then
    local mDist = abs(playerPos.x - points.rechts.x) + abs(playerPos.y - points.rechts.y) + rnd
    if gegenRichtung == "rechts" then mDist = mDist + 5000 end
    if mDist < besteDist then besteDist = mDist besteRichtung = "rechts" end
  end
  // Distanzwerte für Richtung Links auswerten
  if frei.links then
    local mDist = abs(playerPos.x - points.links.x) + abs(playerPos.y - points.links.y) - rnd
    if gegenRichtung == "links" then mDist = mDist + 5000 end
    if mDist < besteDist then besteDist = mDist besteRichtung = "links" end
  end
  // Distanzwerte für Richtung Oben auswerten
  if frei.oben then
    local mDist = abs(playerPos.x - points.oben.x) + abs(playerPos.y - points.oben.y) + rnd
    if gegenRichtung == "oben" then mDist = mDist + 5000 end
    if mDist < besteDist then besteDist = mDist besteRichtung = "oben" end
  end
  // Distanzwerte für Richtung Unten auswerten
  if frei.unten then
    local mDist = abs(playerPos.x - points.unten.x) + abs(playerPos.y - points.unten.y) - rnd
    if gegenRichtung == "unten" then mDist = mDist + 5000 end
    if mDist < besteDist then besteDist = mDist besteRichtung = "unten" end
  end
  // Distanzwerte für Richtung Oben-Rechts auswerten
  if frei.oben_rechts and frei.oben and frei.rechts then
    local mDist = abs(playerPos.x - points.oben_rechts.x) + abs(playerPos.y - points.oben_rechts.y) + rnd
    if gegenRichtung == "oben_rechts" then mDist = mDist + 5000 end
    if mDist < besteDist then besteDist = mDist besteRichtung = "oben_rechts" end
  end
  // Distanzwerte für Richtung Oben-Links auswerten
  if frei.oben_links and frei.oben and frei.links then
    local mDist = abs(playerPos.x - points.oben_links.x) + abs(playerPos.y - points.oben_links.y) - rnd
    if gegenRichtung == "oben_links" then mDist = mDist + 5000 end
    if mDist < besteDist then besteDist = mDist besteRichtung = "oben_links" end
  end
  // Distanzwerte für Richtung Unten-Rechts auswerten
  if frei.unten_rechts and frei.unten and frei.rechts then
    local mDist = abs(playerPos.x - points.unten_rechts.x) + abs(playerPos.y - points.unten_rechts.y) + rnd
    if gegenRichtung == "unten_rechts" then mDist = mDist + 5000 end
    if mDist < besteDist then besteDist = mDist besteRichtung = "unten_rechts" end
  end
  // Distanzwerte für Richtung Unten-Links auswerten
  if frei.unten_links and frei.unten and frei.links then
    local mDist = abs(playerPos.x - points.unten_links.x) + abs(playerPos.y - points.unten_links.y) - rnd
    if gegenRichtung == "unten_links" then mDist = mDist + 5000 end
    if mDist < besteDist then besteDist = mDist besteRichtung = "unten_links" end
  end

  // Gewählte Richtung sichern und Ausweich-Timer setzen
  self.aktuelleAusweichRichtung = besteRichtung
  if besteRichtung != "" then
    self.ausweichTimer = 70
  else
    self.ausweichTimer = 0
  end

  return besteRichtung
end

// Steuert Animationen und Blickrichtungen basierend auf der Geschwindigkeit
setEnemyAnimation = function(self, vx, vy)
  if not self.di then self.di = "front" end
  if not self.lastTex then self.lastTex = 0 end

  local eani = "idle"
  local eanispeed = 1.2

  if vx != 0 or vy != 0 then
    eani = "walking"
    eanispeed = 3
    // Ermittelt die Blickrichtung über die stärkste Bewegungsachse
    if abs(vx) > abs(vy) then
      if vx > 0 then self.di = "right" self.prio = 28
      else self.di = "left" self.prio = 28
      end
    else
      // Richtungsauswertung für die Y-Achse
      if vy > 0 then self.di = "front" self.prio = 28
      else self.di = "back" self.prio = 40
      end
    end
  end

  local eTex = enemytex[eani][self.di]
  if eTex and eTex != self.lastTex then
    self.animation.set(eTex, eanispeed / 60)
    self.lastTex = eTex
  end
  self.animation.play()
end
end()

function()
angriff = function(on, entity, ani, m = 0)
  // Initialisiere per-Entity Variablen falls nicht vorhanden
  if entity.attacklock == 0 then entity.attacklock = 0 end
  if entity.running == 0 then entity.running = 0 end
  if entity.latest == 0 then entity.latest = 0 end
  
  if on == 1 and (entity.attacklock == 0 or entity.running == 1) then
    // Initialisiere latest nur beim ersten Mal
    if entity.latest == 0 then
      entity.latest = ani
      entity.latest.animation.set(hb.asset("player/schwung","ani",0,1), 180/60)
      entity.latest.prio = entity.prio
      world.add(entity.latest)
      entity.running = 1
      entity.latest.animation.play()
    end
    

    
    // Rotation basierend auf der Blickrichtung anpassen
    if m == 0 then
      
      // Position setzen
      entity.latest.position.set(
        entity.x + (18 * (0 + (-1 * ("left" == entity.di)) + ("right" == entity.di))), 
        entity.y + (20 * (0 + (-1 * ("back" == entity.di)) + ("front" == entity.di)))
      )
      
      if entity.di == "front" then
        entity.latest.position.setrot(90)
      elsif entity.di == "back" then
        entity.latest.position.setrot(270)
      elsif entity.di == "left" then
        entity.latest.position.setrot(180)
      elsif entity.di == "right" then
        entity.latest.position.setrot(0)
      end
    elsif m == 1 then // Hier wird Bogenmaß genutzt um es einfacher zu halten
      targetX = mouse.x
      targetY = mouse.y
      
      // Position setzen
      abstand = 20
      entity.latest.position.set(
        entity.x + (cos(winkel) * abstand),
        entity.y + (sin(winkel) * abstand)
      )
      
      // Winkel berechnen (im Bogenmaß / Radians)
      origin = bridgejs("origin")
      winkel = atan2(-targetY, targetX)
      
      // Rotation auf den Schwung und dessen Physik-Body anwenden
      if schwung and schwung.body then
        origin.Matter.Body.setAngle(schwung.body, winkel)
      end
    end
    
    // Frame-Check auf entity.latest um das Animationsende abzufangen
    if entity.latest and entity.latest.animation.currentframe() >= entity.latest.texture.length - 3 then
      entity.running = 0
      if entity.latest then
        world.remove(entity.latest)
        entity.latest = 0
      end
      entity.attacklock = 1
    end
    
  elsif on == 0 then
    // Angriff beenden und zurücksetzen
    entity.attacklock = 0
    if entity.latest and entity.latest != 0 then
      world.remove(entity.latest)
      entity.latest.animation.gotoframe(0)
      entity.latest = 0
    end
  end
end

// Helfer zur Erstellung eines reinen Matter-Rechteck-Körpers
createPureMatterRect = function(width, height, options)
  origin = bridgejs("origin")
  
  // Standard-Objekt erstellen falls keine Optionen übergeben wurden
  if not options or options == 0 then options = object end end
  
  // Standardwert für statische Körper festlegen
  isStatic = 0 
  if options.static != undefined then isStatic = options.static end 
  
  // Standardwert für die Reibung festlegen
  friction = 0.1  
  if options.friction != undefined then friction = options.friction end
  
  // Standardwert für die Dichte festlegen
  density = 0.001
  if options.density != undefined then density = options.density end
  
  // Standardwert für die Elastizität festlegen
  restitution = 0.0
  if options.restitution != undefined then restitution = options.restitution end
  
  // Optionen für die Matter-Engine zusammenstellen
  matterOptions = object
    isStatic = (isStatic == 1)
    friction = friction
    density = density
    restitution = restitution
    inertia = 0
  end
  
  // Rohen Rechteck-Körper in Matter.js erzeugen
  rawBody = origin.Matter.Bodies.rectangle(0, 0, width, height, matterOptions)
  
  // Rotation einfrieren falls die Option aktiv ist
  if options.fixedRotation == 1 or options.fixedRotation == true then
    origin.Matter.Body.setInertia(rawBody, 1e308)
    origin.Matter.Body.setAngularVelocity(rawBody, 0)
  end
  
  return rawBody
end
  
  
  
  
end()

    do // Führt sich auf einem eigenen Thread aus um nicht von Sleep betroffen zu sein
      print("-- hummingbird init --")
      starttime = system.time()

    // Skaliert das Sprite und passt die Hitbox proportional an
    scale = function(newScale)
      local origin = bridgejs("origin")
      
      // Berechne den Skalierungsfaktor relativ zur aktuellen Skalierung für Matter.js
      local relativeScale = newScale / this.scaleFactor
      this.scaleFactor = newScale
      
      // Pixi Sprite-Größe anpassen
      if this.sprite then
        this.sprite.width = this.dscalex * this.scaleFactor
        this.sprite.height = this.dscaley * this.scaleFactor
      end
      
      // Matter.js Hitbox-Größe anpassen
      if this.body then
        origin.Matter.Body.scale(this.body, relativeScale, relativeScale)
      end
    end
    
    static = function(mode)
      local origin = bridgejs("origin")
      if this.body then
        if mode == 1 then
          origin.Matter.Body.setStatic(this.body, true)
        else
          origin.Matter.Body.setStatic(this.body, false)
          // Zwingt Matter.js, die physikalischen Werte (Masse, Dichte) wieder anzupassen:
          origin.Matter.Body.setMass(this.body, this.body.mass) 
          this.body.isSleeping = false
        end
      end
    end

      local origin = bridgejs("origin")
      local children = stage.children
      local sprite = this.sprite

      local body = this.body
    
      if not children.includes(sprite) then
        stage.addChild(sprite)
      end
    
      // Debug Anzeige für Hitboxen
      if debug == 1 and body then
        if not children.includes(debugGraphics) then
          stage.addChild(debugGraphics)
        end
    
        // Erstellt die Debug Grafik aus dem Body
        debugGraphics.clear()
    
        debugGraphics.lineStyle(max(0.2*scaleFactor,0.4), 0xFF0000, 1)    // Rote Linie
        debugGraphics.beginFill(0xFF0000, 0.2)     // Rote Füllung
    
        local parts = body.parts
        local partsLength = parts.length
    
        for j = 0 to partsLength - 1
          local part = parts[j]
          if partsLength > 1 and j == 0 then continue end
    
          local vertices = part.vertices
          local verticesLength = vertices.length
          if verticesLength >= 2 then
            debugGraphics.moveTo(vertices[0].x, vertices[0].y)
            for k = 1 to verticesLength - 1
              debugGraphics.lineTo(vertices[k].x, vertices[k].y)
            end
            debugGraphics.lineTo(vertices[0].x, vertices[0].y)
          end
        end
    
        debugGraphics.endFill()
        debugGraphics._zIndex = this.prio
    
      else
        // Beim Ausschalten alles sauber leeren
        if debugGraphics then
          debugGraphics.clear()
        end
    
        if children.includes(debugGraphics) then
          stage.removeChild(debugGraphics)
        end
      end
    
      sprite.zIndex = this.prio
    
      if renderoff != 1 then
        targetscreen.render(stage)
      end
    end
    
    play = function(phyEngine)
      local origin = bridgejs("origin")
      
      if this.body.isSleeping == true then
        this.body.isSleeping = false
      end
      
      if phyEngine and this.body then
        local allBodies = origin.Matter.Composite.allBodies(phyEngine.world)
        if not allBodies.includes(this.body) then
          origin.Matter.Composite.add(phyEngine.world, this.body)
        end
      end
      
      if this.body then
        // Die Hitbox (Matter.js) ist immer der Chef! Die Microscript-Variablen folgen ihr.
        this.x = this.body.position.x
        this.y = this.body.position.y
        this.rotation = this.body.angle
      end
      
      this.sprite.x = this.x
      this.sprite.y = this.y
      this.sprite.rotation = this.rotation
      
      if this.action != 0 then
        this.action(this)
      end
    end

    selfremove = function()
      local origin = bridgejs("origin")
      if not this.currentWorld or this.currentWorld == 0 then return end
      local w = this.currentWorld
      
      if this.sprite and w.stage.children.includes(this.sprite) then
        w.stage.removeChild(this.sprite)
      end
      
      if this.debugGraphics and w.stage.children.includes(this.debugGraphics) then
        w.stage.removeChild(this.debugGraphics)
        this.debugGraphics.clear()
      end
      
      if this.body and w.physicsEngine then
        origin.Matter.Composite.remove(w.physicsEngine.world, this.body)
      end
    end
    
    // Gibt die alle Kolisionen (die anderen Objekte) vom Objekt zurück zurück
    collisions = function()
      local origin = bridgejs("origin")
      phyengine = this.currentWorld.physicsEngine
      
      if not phyengine then return [] end
      if not this.body then return [] end
      
      local allBodies = origin.Matter.Composite.allBodies(phyengine.world)
      local otherBodies = []
      
      for i = 0 to allBodies.length - 1
        if allBodies[i] != this.body then
          otherBodies.push(allBodies[i])
        end
      end
      
      local collisionsList = origin.Matter.Query.collides(this.body, otherBodies)
      local collidedWith = []
      
      for i = 0 to collisionsList.length - 1
        local col = collisionsList[i]
        if col.bodyA == this.body then
          collidedWith.push(col.bodyB)
        else
          collidedWith.push(col.bodyA)
        end
      end
      
      local results = []
      for i = 0 to collidedWith.length - 1
        local hit = collidedWith[i]
        if this.body.parts.includes(hit) then
          continue
        else
          local mainBody = hit
          if hit.parent then mainBody = hit.parent end
          if mainBody.gameObject then
            local gObj = mainBody.gameObject
            if not results.includes(gObj) then 
              results.push(gObj)
            end
          else
            results.push(0)
          end
        end
      end
      return results
    end
    
    // Erstellt ein neues gleiches Objekt

        origin.Matter.Body.setAngle(newObj.body, this.body.angle)
        origin.Matter.Body.setVelocity(newObj.body, object x = this.body.velocity.x y = this.body.velocity.y end)

        left: rect.left + "px",

          logicalWidth = Math.round(1200 * aspect);

    // Eingabe auf Gültigkeit prüfen
    if (!path) return null;

    const parts = String(path).split('.').filter(Boolean);

    let current = window;

      } catch (e) {

      }
  }

  loadMatter();


  // Funktion zur automatischen Generierung von Hitboxen aus Texturen
  origin.createBodyFromTexture = function(pixiTexture, targetWidth = 100, targetHeight = 100, options = {}) {
    const Matter = origin.Matter;
    if (!Matter) return null;
  
    // Basis-Ressource der PIXI-Textur extrahieren
    const baseTexture = pixiTexture.baseTexture;
    if (!baseTexture || !baseTexture.resource) return null;
    const source = baseTexture.resource.source;
  
    // Frame-Dimensionen der Textur bestimmen
    const frameX = pixiTexture.frame.x;
    const frameY = pixiTexture.frame.y;
    const frameWidth = pixiTexture.frame.width;
    const frameHeight = pixiTexture.frame.height;
  
    // Temporäres Canvas zur Pixel-Analyse erstellen
    const tempCanvas = origin.tempcanvas();
    tempCanvas.width = frameWidth;
    tempCanvas.height = frameHeight;
    const ctx = tempCanvas.getContext("2d");
    
    // Textur-Ausschnitt auf das Canvas zeichnen
    ctx.drawImage(
      source,
      frameX, frameY, frameWidth, frameHeight,
      0, 0, frameWidth, frameHeight
    );
    
    // Pixel-Farbdaten des gezeichneten Ausschnitts auslesen
    const pixels = ctx.getImageData(0, 0, frameWidth, frameHeight).data;
  
    // Hilfsfunktion zur Prüfung ob ein Pixel solide ist anhand des Alpha-Werts
    const isPixelSolid = (x, y) => {
      if (x < 0 || x >= frameWidth || y < 0 || y >= frameHeight) return false;
      return pixels[(y * frameWidth + x) * 4 + 3] > 30; 
    };
  
    // Skalierungsfaktoren für die Zielgröße berechnen
    const scaleX = targetWidth / frameWidth;
    const scaleY = targetHeight / frameHeight;
    
    // Schritt 1: Horizontale Segmente (Spanne) pro Zeile sammeln
    const rawRows = [];
    for (let y = 0; y < frameHeight; y++) {
      const rowSegments = [];
      let startX = null;
      
      for (let x = 0; x <= frameWidth; x++) {
        let solid = (x < frameWidth) ? isPixelSolid(x, y) : false;
        if (solid) {
          if (startX === null) startX = x;
        } else {
          if (startX !== null) {
            rowSegments.push({ startX: startX, endX: x, y: y, merged: false });
            startX = null;
          }
        }
      }
      rawRows.push(rowSegments);
    }
  
    // Schritt 2: Vertikales Kombinieren (Zeile für Zeile nach unten verschmelzen)
    const finalRects = [];
    for (let y = 0; y < frameHeight; y++) {
      for (let i = 0; i < rawRows[y].length; i++) {
        const seg = rawRows[y][i];
        if (seg.merged) continue;
  
        let currentH = 1;
        seg.merged = true;
  
        // Schaue in die darauffolgenden Zeilen, ob dort ein exakt deckungsgleiches Segment liegt
        for (let nextY = y + 1; nextY < frameHeight; nextY++) {
          let foundMatch = false;
          for (let j = 0; j < rawRows[nextY].length; j++) {
            const nextSeg = rawRows[nextY][j];
            // Wenn der Streifen exakt die gleiche X-Start- und X-Endposition hat
            if (!nextSeg.merged && nextSeg.startX === seg.startX && nextSeg.endX === seg.endX) {
              nextSeg.merged = true;
              currentH++;
              foundMatch = true;
              break;
            }
          }
          // Sobald eine Zeile das Segment unterbricht, stoppen wir das vertikale Wachstum
          if (!foundMatch) break;
        }
  
        // Speicher das optimierte, größere Rechteck ab
        finalRects.push({
          startX: seg.startX,
          endX: seg.endX,
          startY: seg.y,
          height: currentH
        });
      }
    }
  
    // Schritt 3: Matter.js Körper aus den zusammengefassten Blöcken bauen
    const mainBody = Matter.Body.create(Object.assign({
      position: { x: 0, y: 0 }
    }, options));
  
    // Einzelne Teil-Körper für die zusammengesetzten Rechtecke erzeugen
    const parts = [];
    for (let i = 0; i < finalRects.length; i++) {
      const r = finalRects[i];
      const pixelWidth = r.endX - r.startX;
      
      const w = pixelWidth * scaleX;
      const h = r.height * scaleY;
      
      // Position relativ zum echten mathematischen Zentrum berechnen
      const posX = ((r.startX + pixelWidth / 2) - frameWidth / 2) * scaleX;
      const posY = ((r.startY + r.height / 2) - frameHeight / 2) * scaleY;
  
      parts.push(Matter.Bodies.rectangle(posX, posY, w, h, options));
    }
  
    // Fallback-Körper erzeugen falls keine soliden Pixel gefunden wurden
    if (parts.length === 0) {
      return Matter.Bodies.rectangle(0, 0, targetWidth, targetHeight, options);
    }
  
    // Starre Kopplung an den unverschiebbaren Master-Anker vornehmen
    Matter.Body.setParts(mainBody, [mainBody].concat(parts));
    
    // Positionen und vorherige Positionen des Hauptkörpers initialisieren
    mainBody.position.x = 0;
    mainBody.position.y = 0;
    mainBody.positionPrev.x = 0;
    mainBody.positionPrev.y = 0;
  
    return mainBody;
  };
}

      if x == 0 or x == roomnumberx - 1 or y == 0 or y == roomnumbery - 1 then
        // Rand-Raum zuweisen
        currentRoom = rooms["edge"].clone()
      else
        // Zufälligen Raum für das Innere der Map auswählen
        local randomIndex = random.nextInt(roomCount)
        local selectedRoomKey = availableRooms[randomIndex]
        currentRoom = rooms[selectedRoomKey].clone()
      end
      
      // Den Raum im Map-Grid platzieren
      map[x][y] = currentRoom
    end
  end
  
  return map
end
end()

// Logik-Update der UI (uiupdate)
uiupdate = function()
  if not global.gameStarted then
    // Klick-Abfrage für den Start-Button im Hauptmenü
    if mouse.left then
      local leftBorder   = -btnWidth / 2
      local rightBorder  =  btnWidth / 2
      local topBorder    =  btnHeight / 2
      local bottomBorder = -btnHeight / 2
      
      // Prüfen ob der Klick innerhalb der Button-Grenzen liegt
      if mouse.x >= leftBorder and mouse.x <= rightBorder and mouse.y >= bottomBorder and mouse.y <= topBorder then
        print("Spiel gestartet!")
        global.gameStarted = true
        global.gameStartTime = system.time() 
        
        // Menü-Elemente ausblenden und Gameplay-HUD einblenden
        buttonContainer.visible = false 
        infoContainer.visible = false   
        hudContainer.visible = true     
        timerContainer.visible = true   
      end
    end
    
  else
    // Fallbacks für die Dimensionen falls der Renderer noch lädt
    local renderWidth = 800
    local renderHeight = 800
    
    if displayui and displayui.renderer then
      renderWidth = displayui.renderer.width
      renderHeight = displayui.renderer.height
    end

    // Abstände vom Bildschirmrand definieren
    local herzAbstandX = 200
    local herzAbstandY = 200
    
    // Position des HUDs dynamisch an die Bildschirmgröße anpassen
    local dynamicX = renderWidth - herzAbstandX
    local dynamicY = renderHeight - herzAbstandY
    
    hudContainer.position.set(-dynamicX / 2, dynamicY / 2)

    // Timer-Logik und Positionierung ausführen
    global.elapsedSeconds = floor(system.time() - global.gameStartTime)
    
    local minutes = floor((global.elapsedSeconds / 1000)/60)
    local seconds = floor(global.elapsedSeconds / 1000)-minutes*60
    
    // Führende Nullen für die Zeitanzeige zusammensetzen
    local strMin = "" + minutes
    if minutes < 10 then strMin = "0" + minutes end
    
    local strSec = "" + seconds
    if seconds < 10 then strSec = "0" + seconds end
    
    timerText.text = strMin + ":" + strSec
    
    // Den Timer zentriert am oberen Bildschirmrand platzieren
    timerContainer.position.set(0, (-renderHeight / 2) + 40)

    // Aktuelle Lebenspunkte des Spielers formatiert anzeigen
    if global.player.lp < 0 then global.player.lp = 0 end
    lpText.text = floor(global.player.lp)
  end
end
